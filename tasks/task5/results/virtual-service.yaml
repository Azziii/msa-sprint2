apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: booking-service
spec:
  hosts:
    - "*"
  gateways:
    - booking-gateway
  http:

    # Feature flag (заголовок)
    - match:
        - headers:
            X-Feature-Enabled:
              exact: "true"
      route:
        - destination:
            host: booking-service
            subset: v2

    # Основной трафик (canary 90/10)
    - route:
        - destination:
            host: booking-service
            subset: v1
          weight: 90
        - destination:
            host: booking-service
            subset: v2
          weight: 10

      retries:
        attempts: 3
        perTryTimeout: 2s

      fault:
        abort:
          httpStatus: 500
          percentage:
            value: 0