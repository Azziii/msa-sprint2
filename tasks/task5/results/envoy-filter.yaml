apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: booking-feature-flag
spec:
  workloadSelector:
    labels:
      app: booking-service
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: SIDECAR_INBOUND
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.lua
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
            inlineCode: |
              function envoy_on_request(request_handle)
                local header = request_handle:headers():get("X-Feature-Enabled")
                if header == "true" then
                  request_handle:headers():add("x-route-to", "v2")
                end
              end