version: v2
replicaCount: 1

image:
  name: localhost/booking-service
  tag: latest
  pullPolicy: Never

env:
  - name: ENABLE_FEATURE_X
    value: "true"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"

livenessProbe:
  path: /ping
  initialDelaySeconds: 5

readinessProbe:
  path: /ping
  initialDelaySeconds: 5