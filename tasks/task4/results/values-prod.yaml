replicaCount: 3

image:
  name: localhost/booking-service
  tag: latest
  pullPolicy: Never

env:
  - name: ENABLE_FEATURE_X
    value: "false"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

livenessProbe:
  path: /ping
  initialDelaySeconds: 5

readinessProbe:
  path: /ping
  initialDelaySeconds: 5